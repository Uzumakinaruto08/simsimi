<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimSimi AI Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 85vh;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Header Styling */
        .chat-header {
            background-color: #ffde00;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e0c300;
        }

        .header-main {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background-color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .bot-info h3 {
            color: #333;
            font-size: 1.1rem;
        }

        .bot-info p {
            color: #666;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
        }

        .settings-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .settings-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        /* Settings Panel Overlay */
        .settings-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .settings-modal {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .settings-modal h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .settings-modal p {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .settings-modal input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
        }

        .settings-modal .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .settings-modal button {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-save { background: #ffde00; color: #333; }
        .btn-cancel { background: #eee; color: #666; }

        /* Chat Window / Messages Area */
        .chat-messages {
            flex: 1;
            padding: 20px;
            background-color: #f9f9f9;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.bot {
            background-color: #fff;
            color: #333;
            align-self: flex-start;
            border-top-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .message.user {
            background-color: #ffde00;
            color: #333;
            align-self: flex-end;
            border-top-right-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: #e8e8e8;
            padding: 12px 16px;
            border-radius: 18px;
            border-top-left-radius: 5px;
        }

        .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #777;
            border-radius: 50%;
            animation: bounce 1.3s linear infinite;
        }
        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        /* Input Area */
        .chat-input-area {
            padding: 15px;
            background-color: #fff;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #ffde00;
        }

        .chat-input-area button {
            background-color: #ffde00;
            border: none;
            color: #333;
            font-weight: bold;
            padding: 0 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-input-area button:hover {
            background-color: #e6c800;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Settings Overlay Panel -->
        <div class="settings-overlay" id="settingsOverlay">
            <div class="settings-modal">
                <h4>Gemini API Configuration</h4>
                <p>Enter your free Gemini API key to connect the chatbot. Get one for free at aistudio.google.com.</p>
                <input type="password" id="apiKeyInput" placeholder="AIzaSy..." autocomplete="off">
                <div class="actions">
                    <button class="btn-cancel" id="cancelSettingsBtn">Close</button>
                    <button class="btn-save" id="saveSettingsBtn">Save Key</button>
                </div>
            </div>
        </div>

        <!-- Header -->
        <div class="chat-header">
            <div class="header-main">
                <div class="avatar">🐥</div>
                <div class="bot-info">
                    <h3>SimSimi AI</h3>
                    <p><span class="status-dot"></span> Online</p>
                </div>
            </div>
            <button class="settings-btn" id="openSettingsBtn" title="API Settings">⚙️</button>
        </div>

        <!-- Chat Logs Area -->
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">Hi there! I'm SimSimi AI. Let's talk! O gusto mo mag-Tagalog tayo? 🐥</div>
            
            <div class="typing-indicator" id="typingIndicator">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        
        // UI Control Elements for API Key
        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const cancelSettingsBtn = document.getElementById('cancelSettingsBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const apiKeyInput = document.getElementById('apiKeyInput');

        // System prompt to maintain SimSimi's authentic, witty persona
        const SYSTEM_INSTRUCTION = "You are SimSimi, a cute, slightly sassy, energetic yellow chick avatar. Respond playfully, briefly, and match the user's language seamlessly. Use Taglish, English, or Tagalog naturally depending on how the user talks to you. Keep answers short like a real chat app.";

        let chatHistory = [];

        // UI Event Listeners for handling the Settings Box
        openSettingsBtn.addEventListener('click', () => {
            apiKeyInput.value = localStorage.getItem('GEMINI_API_KEY') || '';
            settingsOverlay.style.display = 'flex';
        });

        cancelSettingsBtn.addEventListener('click', () => {
            settingsOverlay.style.display = 'none';
        });

        saveSettingsBtn.addEventListener('click', () => {
            const keyVal = apiKeyInput.value.trim();
            if(keyVal) {
                localStorage.setItem('GEMINI_API_KEY', keyVal);
            } else {
                localStorage.removeItem('GEMINI_API_KEY');
            }
            settingsOverlay.style.display = 'none';
        });

        function appendMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.innerText = text;
            
            chatMessages.insertBefore(messageDiv, typingIndicator);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function fetchAIResponse(userText) {
            typingIndicator.style.display = 'block';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Fetch current saved credential from local browser memory
            const currentApiKey = localStorage.getItem('GEMINI_API_KEY');

            if (!currentApiKey) {
                setTimeout(() => {
                    typingIndicator.style.display = 'none';
                    appendMessage("Oops! Click the gear icon (⚙️) at the top right to save your Gemini API Key so we can start talking! 🔑", 'bot');
                }, 1000);
                return;
            }

            chatHistory.push({ role: "user", parts: [{ text: userText }] });

            try {
                // Connecting to Google's standard fast multi-lingual conversational endpoint
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: chatHistory,
                        systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                        generationConfig: { maxOutputTokens: 150 }
                    })
                });

                if (!response.ok) throw new Error("API Exception encountered");

                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;

                typingIndicator.style.display = 'none';
                appendMessage(botReply, 'bot');

                chatHistory.push({ role: "model", parts: [{ text: botReply }] });

            } catch (error) {
                console.error(error);
                typingIndicator.style.display = 'none';
                appendMessage("Medyo nagka-error sa network ko o invalid ang API Key mo, paki-subukan ulit mamaya! 🐥", 'bot');
            }
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (text === '') return;

            appendMessage(text, 'user');
            userInput.value = '';

            fetchAIResponse(text);
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
